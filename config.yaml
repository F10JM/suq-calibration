# --- Backend ---
# "api" = HF Inference API (requires HF_TOKEN and API credits)
# "local" = local transformers models on GPU (requires torch + transformers + VRAM)
backend: "local"

# --- Models ---
generator_model: "Qwen/Qwen2.5-7B-Instruct"
evaluator_model: "Qwen/Qwen2.5-7B-Instruct"

# --- Dataset ---
dataset: "trivia_qa"
dataset_split: "validation"
num_queries: 300
seed: 42

# --- Generation ---
num_samples: 10
temperature: 1.0
max_new_tokens: 128

# --- Similarity ---
similarity_methods:
  - "llm_judge"
  - "rouge_l"

# --- Calibration ---
num_bins: 10
num_bootstrap: 1000

# --- Paths ---
output_dir: "./results"
generation_cache: "./results/generations.jsonl"
similarity_cache_dir: "./results"

# --- API settings ---
api_max_retries: 5
api_retry_delay: 2.0
api_concurrent_requests: 1
